<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#ff007f">
  <title>DOSA Online</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="DOSA">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/socket.io/socket.io.js"></script>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');
    body { overscroll-behavior: none; font-family: 'Outfit', sans-serif; background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); color: #f1f5f9; min-height: 100vh; }
    .piece { transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
    
    /* 3D Dice CSS */
    .dice-scene { width: 44px; height: 44px; perspective: 400px; margin: 0 auto; z-index: 20; }
    .cube {
      width: 100%; height: 100%; position: relative;
      transform-style: preserve-3d;
      transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
      transform: rotateX(-25deg) rotateY(45deg);
    }
    .cube.rolling { animation: spin 0.6s linear infinite; }
    @keyframes spin {
      0% { transform: rotateX(0deg) rotateY(0deg) rotateZ(0deg); }
      100% { transform: rotateX(360deg) rotateY(360deg) rotateZ(0deg); }
    }
    .face {
      position: absolute; width: 44px; height: 44px;
      background: #ffffff;
      border: 1px solid #e2e8f0; border-radius: 8px;
      display: grid; padding: 6px;
      box-shadow: inset 0 0 10px rgba(0,0,0,0.02);
    }
    .face-1 { transform: rotateY(0deg) translateZ(22px); place-items: center; }
    .face-2 { transform: rotateY(90deg) translateZ(22px); display: flex; flex-direction: column; justify-content: space-between; padding: 6px; box-sizing: border-box; }
    .face-2 .dot:nth-child(1) { align-self: flex-start; margin: 0; }
    .face-2 .dot:nth-child(2) { align-self: flex-end; margin: 0; }
    .face-3 { transform: rotateX(90deg) translateZ(22px); grid-template-columns: 1fr 1fr 1fr; grid-template-rows: 1fr 1fr 1fr; }
    .face-3 .dot:nth-child(1) { grid-area: 1/3/2/4; align-self: start; justify-self: end; }
    .face-3 .dot:nth-child(2) { grid-area: 2/2/3/3; align-self: center; justify-self: center; }
    .face-3 .dot:nth-child(3) { grid-area: 3/1/4/2; align-self: end; justify-self: start; }
    .face-4 { transform: rotateX(-90deg) translateZ(22px); grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }
    .face-4 .dot { align-self: center; justify-self: center; }
    .face-5 { transform: rotateY(-90deg) translateZ(22px); grid-template-columns: 1fr 1fr 1fr; grid-template-rows: 1fr 1fr 1fr; }
    .face-5 .dot { align-self: center; justify-self: center; }
    .face-5 .dot:nth-child(1) { grid-area: 1/1/2/2; }
    .face-5 .dot:nth-child(2) { grid-area: 1/3/2/4; }
    .face-5 .dot:nth-child(3) { grid-area: 2/2/3/3; }
    .face-5 .dot:nth-child(4) { grid-area: 3/1/4/2; }
    .face-5 .dot:nth-child(5) { grid-area: 3/3/4/4; }
    .face-6 { transform: rotateY(180deg) translateZ(22px); grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr 1fr; }
    .face-6 .dot { align-self: center; justify-self: center; }
    
    .dot {
      background-color: var(--player-color, #333);
      border-radius: 50%; width: 6px; height: 6px;
      box-shadow: 0 0 6px var(--player-color, rgba(0,0,0,0.5));
      transition: background-color 0.4s ease, box-shadow 0.4s ease;
    }
    
    @keyframes floatUp {
      0% { transform: translateY(0) scale(0.5); opacity: 0; }
      10% { transform: translateY(-50px) scale(1.5); opacity: 1; }
      80% { transform: translateY(-70px) scale(1.5); opacity: 1; }
      100% { transform: translateY(-100px) scale(1); opacity: 0; }
    }
    .emote-anim {
      animation: floatUp 2.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 h-screen flex flex-col overflow-hidden relative selection:bg-rose-500/30">

  <!-- HOME SCREEN -->
  <div id="home-screen" class="absolute inset-0 z-[60] flex flex-col items-center justify-center p-6" style="background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);">
    <h1 class="text-6xl font-black tracking-[0.3em] uppercase mb-2 text-center" style="color:#ff007f; text-shadow: 0 0 30px rgba(255,0,127,0.8), 0 0 60px rgba(255,0,127,0.4);">DOSA</h1>
    <p class="text-sm font-bold tracking-[0.5em] text-indigo-300 mb-10 uppercase">Online</p>
    <div class="w-full max-w-sm p-8 rounded-3xl text-center" style="background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 25px 50px rgba(0,0,0,0.5);">
      <p class="text-xs font-bold text-indigo-300 uppercase tracking-widest mb-2">Your Nickname</p>
      <input type="text" id="nickname-input" placeholder="e.g. Maverick" class="w-full h-12 rounded-xl px-4 text-center text-lg font-bold focus:outline-none transition-all mb-4" style="background: rgba(255,255,255,0.08); border: 2px solid rgba(255,255,255,0.15); color: #f1f5f9;" autocomplete="off" maxlength="15" />
      
      <p class="text-xs font-bold text-indigo-300 uppercase tracking-widest mb-2">Enter Room Code</p>
      <input type="text" id="room-code-input" placeholder="e.g. DOSA" class="w-full h-12 rounded-xl px-4 text-center text-lg font-bold uppercase tracking-widest focus:outline-none transition-all mb-5" style="background: rgba(255,255,255,0.08); border: 2px solid rgba(255,255,255,0.15); color: #f1f5f9;" autocomplete="off" maxlength="8" />
      
      <button onclick="joinRoom()" class="w-full py-4 rounded-xl font-black tracking-widest uppercase transition-all hover:-translate-y-1 active:translate-y-0" style="background: linear-gradient(135deg, #ff007f, #ff6b35); color: white; box-shadow: 0 8px 25px rgba(255,0,127,0.4);">Join Session</button>
      <p class="text-xs text-indigo-300/60 mt-5 font-medium">Create a room or join a friend's.</p>
    </div>
    
    <!-- Open Lobbies Container -->
    <div id="open-rooms-container" class="w-full max-w-sm mt-6 p-6 rounded-3xl text-center hidden" style="background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 25px 50px rgba(0,0,0,0.5);">
      <p class="text-xs font-bold text-indigo-300 uppercase tracking-widest mb-3 text-center">Live Games & Lobbies</p>
      <div id="open-rooms-list" class="flex flex-col gap-3 max-h-48 overflow-y-auto pr-1"></div>
    </div>
  </div>

  <!-- LOBBY SCREEN -->
  <div id="lobby-screen" class="hidden absolute inset-0 z-50 flex flex-col items-center justify-center p-6" style="background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);">
    <h1 class="text-5xl font-black tracking-[0.3em] uppercase mb-1 text-center" style="color:#ff007f; text-shadow: 0 0 20px rgba(255,0,127,0.7);">DOSA</h1>
    <p class="text-xs font-bold tracking-[0.5em] text-indigo-300 mb-8 uppercase">Online</p>
    <div class="w-full max-w-sm p-6 rounded-3xl" style="background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 25px 50px rgba(0,0,0,0.5);">
      <div class="mb-5 text-center">
        <h2 class="text-xl font-black text-white tracking-tight" id="lobby-room-code">Room: ----</h2>
        <p class="text-xs font-bold text-indigo-300 uppercase tracking-widest mt-1">Select Your Player</p>
      </div>
      <div class="grid grid-cols-2 gap-3 mb-6">
        <div id="slot-0" class="h-14 rounded-xl flex overflow-hidden transition-all" style="border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.05);"></div>
        <div id="slot-1" class="h-14 rounded-xl flex overflow-hidden transition-all" style="border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.05);"></div>
        <div id="slot-2" class="h-14 rounded-xl flex overflow-hidden transition-all" style="border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.05);"></div>
        <div id="slot-3" class="h-14 rounded-xl flex overflow-hidden transition-all" style="border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.05);"></div>
      </div>
      <div class="mb-5">
        <p class="text-xs font-bold text-indigo-300 uppercase tracking-widest mb-3 text-center">Pegs per Player</p>
        <div class="flex gap-3">
          <button id="btn-pegs-2" onclick="setPegs(2)" class="flex-1 py-3 rounded-xl font-bold transition-all" style="background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); color: #94a3b8;">2 Pegs</button>
          <button id="btn-pegs-4" onclick="setPegs(4)" class="flex-1 py-3 rounded-xl font-bold transition-all" style="background: linear-gradient(135deg,#6366f1,#8b5cf6); color: white;">4 Pegs</button>
        </div>
      </div>
      <button id="start-btn" onclick="startGame()" disabled class="w-full py-4 rounded-xl font-black tracking-widest uppercase transition-all disabled:opacity-40 disabled:cursor-not-allowed" style="background: linear-gradient(135deg,#ff007f,#ff6b35); color: white; box-shadow: 0 8px 25px rgba(255,0,127,0.4);">Waiting for players...</button>
      <div class="text-center mt-4 flex justify-between px-2">
        <button onclick="leaveRoom()" class="text-xs font-bold text-indigo-300 uppercase tracking-wider hover:text-white transition-colors">🚪 Leave</button>
        <button onclick="resetSession()" class="text-xs font-bold text-red-400 uppercase tracking-wider hover:text-red-300 transition-colors">⚠ Force Reset</button>
      </div>
    </div>
  </div>

  <!-- VICTORY SCREEN -->
  <div id="victory-screen" class="hidden absolute inset-0 z-[60] flex flex-col items-center justify-center p-6" style="background: rgba(15,12,41,0.85); backdrop-filter: blur(20px);">
    <div class="w-full max-w-sm p-10 rounded-3xl text-center" style="background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.15); box-shadow: 0 25px 60px rgba(0,0,0,0.6);">
      <div class="text-5xl mb-4">🏆</div>
      <h2 class="text-xs font-bold text-indigo-300 uppercase tracking-[0.4em] mb-3">Final Standings</h2>
      <div id="winner-name" class="text-left mb-8 space-y-1" style="min-height:40px;"></div>
      <button onclick="returnToLobby()" class="w-full py-4 mb-3 rounded-2xl font-black tracking-widest uppercase transition-all hover:-translate-y-1" style="background: linear-gradient(135deg,#6366f1,#8b5cf6); color: white; box-shadow: 0 8px 25px rgba(99,102,241,0.4);">Play Again</button>
      <button onclick="leaveRoom()" class="w-full py-4 rounded-2xl font-bold tracking-widest uppercase transition-all" style="background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); color: #94a3b8;">Leave Room</button>
    </div>
  </div>

  <!-- GAME SCREEN -->
  <div id="game-screen" class="hidden h-full flex-col">
    <!-- Header -->
    <header class="text-center pt-6 pb-2 relative z-10 flex-shrink-0 flex items-center justify-between px-5">
      <button onclick="leaveRoom()" class="w-10 h-10 rounded-full flex items-center justify-center transition-all" style="background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15); color: #94a3b8;" title="Leave">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M3 3a1 1 0 00-1 1v12a1 1 0 102 0V4a1 1 0 00-1-1zm10.293 9.293a1 1 0 001.414 1.414l3-3a1 1 0 000-1.414l-3-3a1 1 0 10-1.414 1.414L14.586 9H7a1 1 0 100 2h7.586l-1.293 1.293z" clip-rule="evenodd" /></svg>
      </button>
      <div>
        <h1 class="text-2xl font-black tracking-[0.4em] uppercase" style="color:#ff007f; text-shadow: 0 0 15px rgba(255,0,127,0.8);">DOSA</h1>
        <p id="status-text" class="text-xs font-bold mt-1 inline-block px-5 py-1.5 rounded-full tracking-widest uppercase transition-all duration-300" style="background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15); color: #e2e8f0;">Game Started</p>
      </div>
      <div class="w-10 pointer-events-none"></div>
    </header>

    <!-- Board Area -->
    <div class="w-full max-w-[420px] mx-auto relative aspect-square flex-shrink-0 z-10">
      <div id="board-container" class="absolute inset-4 transition-transform duration-700 ease-in-out">
        <!-- Surface -->
        <div class="absolute inset-0 rounded-2xl shadow-2xl border-2 border-white/10" style="background: linear-gradient(145deg, #1e1b4b, #312e81); box-shadow: 0 0 40px rgba(99,102,241,0.3), inset 0 1px 0 rgba(255,255,255,0.1);"></div>
        <div id="holes" class="absolute inset-0 z-0"></div>
        <div id="pieces" class="absolute inset-0 z-10 pointer-events-auto"></div>
      </div>
    </div>

    <!-- Bottom UI Controls -->
    <div class="flex-1 w-full max-w-[420px] mx-auto mt-2 mb-6 px-4 flex justify-between items-center relative z-10">
      
      <!-- Emote Button -->
      <div class="relative group">
        <button class="w-16 h-16 rounded-full flex items-center justify-center active:scale-95 transition-all outline-none text-2xl" style="background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); backdrop-filter: blur(10px);">
          💬
        </button>
        <div class="absolute bottom-full mb-3 left-0 p-2 rounded-[2rem] flex-col gap-1 hidden group-hover:flex group-focus-within:flex z-50" style="background: rgba(15,12,41,0.9); border: 1px solid rgba(255,255,255,0.15); backdrop-filter: blur(20px); box-shadow: 0 20px 40px rgba(0,0,0,0.5);">
          <button onclick="sendEmote('😂')" class="w-12 h-12 rounded-full text-2xl transition-all hover:scale-125">😂</button>
          <button onclick="sendEmote('😡')" class="w-12 h-12 rounded-full text-2xl transition-all hover:scale-125">😡</button>
          <button onclick="sendEmote('😭')" class="w-12 h-12 rounded-full text-2xl transition-all hover:scale-125">😭</button>
          <button onclick="sendEmote('💀')" class="w-12 h-12 rounded-full text-2xl transition-all hover:scale-125">💀</button>
          <button onclick="sendEmote('🐦')" class="w-12 h-12 rounded-full text-2xl transition-all hover:scale-125">🐦</button>
          <button onclick="sendEmote('💧')" class="w-12 h-12 rounded-full text-2xl transition-all hover:scale-125">💧</button>
        </div>
      </div>

      <button id="dice-btn" onclick="rollDice()" class="w-24 h-24 rounded-full flex flex-col items-center justify-center active:scale-95 transition-all outline-none relative" style="background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.2); backdrop-filter: blur(10px); box-shadow: 0 8px 32px rgba(0,0,0,0.3);">
        <div class="dice-scene pointer-events-none">
          <div class="cube" id="dice-cube" style="--player-color: #f43f5e;">
            <div class="face face-1"><div class="dot"></div></div>
            <div class="face face-2"><div class="dot"></div><div class="dot"></div></div>
            <div class="face face-3"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
            <div class="face face-4"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
            <div class="face face-5"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
            <div class="face face-6"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
          </div>
        </div>
      </button>

      <div class="w-16 h-16 pointer-events-none"></div>
    </div>
  </div>

<script>
const socket = io();


// =============== BOARD CONSTANTS ===============
let GRID_SIZE = 19; // -9 to 9
let OFFSET = 9;

let JAILS = {
  0: [[-1.5, -9], [-0.5, -9], [0.5, -9], [1.5, -9]], // Top
  1: [[9, -1.5], [9, -0.5], [9, 0.5], [9, 1.5]],     // Right
  2: [[1.5, 9], [0.5, 9], [-0.5, 9], [-1.5, 9]],     // Bottom
  3: [[-9, 1.5], [-9, 0.5], [-9, -0.5], [-9, -1.5]]  // Left
};

let HOMES = {
  0: [[0, -7], [0, -6], [0, -5], [0, -4], [0, -3], [0, -2], [0, -1]],
  1: [[7, 0], [6, 0], [5, 0], [4, 0], [3, 0], [2, 0], [1, 0]],
  2: [[0, 7], [0, 6], [0, 5], [0, 4], [0, 3], [0, 2], [0, 1]],
  3: [[-7, 0], [-6, 0], [-5, 0], [-4, 0], [-3, 0], [-2, 0], [-1, 0]]
};

const GOAL = [0, 0];

// 64 spaces around the perimeter
let PERIMETER = [
  [-2, -8], [-1, -8], [0, -8], [1, -8], [2, -8],
  [2, -7], [2, -6], [2, -5], [2, -4], [2, -3], [2, -2],
  [3, -2], [4, -2], [5, -2], [6, -2], [7, -2], [8, -2],
  [8, -1], [8, 0], [8, 1], [8, 2],
  [7, 2], [6, 2], [5, 2], [4, 2], [3, 2], [2, 2],
  [2, 3], [2, 4], [2, 5], [2, 6], [2, 7], [2, 8],
  [1, 8], [0, 8], [-1, 8], [-2, 8],
  [-2, 7], [-2, 6], [-2, 5], [-2, 4], [-2, 3], [-2, 2],
  [-3, 2], [-4, 2], [-5, 2], [-6, 2], [-7, 2], [-8, 2],
  [-8, 1], [-8, 0], [-8, -1], [-8, -2],
  [-7, -2], [-6, -2], [-5, -2], [-4, -2], [-3, -2], [-2, -2],
  [-2, -3], [-2, -4], [-2, -5], [-2, -6], [-2, -7]
];

let START_SPACES = [4, 20, 36, 52]; // Left outer corner when facing center
let SHORTCUT_SPACES = [10, 26, 42, 58]; // The 4 inner corners

function updateBoardConstants() {
  const is2Pegs = (pegsCountGlobal === 2);
  GRID_SIZE = is2Pegs ? 11 : 19;
  OFFSET = is2Pegs ? 5 : 9;
  
  JAILS = is2Pegs ? {
    0: [[-0.5, -5], [0.5, -5]],
    1: [[5, -0.5], [5, 0.5]],
    2: [[0.5, 5], [-0.5, 5]],
    3: [[-5, 0.5], [-5, -0.5]]
  } : {
    0: [[-1.5, -9], [-0.5, -9], [0.5, -9], [1.5, -9]],
    1: [[9, -1.5], [9, -0.5], [9, 0.5], [9, 1.5]],
    2: [[1.5, 9], [0.5, 9], [-0.5, 9], [-1.5, 9]],
    3: [[-9, 1.5], [-9, 0.5], [-9, -0.5], [-9, -1.5]]
  };

  HOMES = is2Pegs ? {
    0: [[0, -3], [0, -2]],
    1: [[3, 0], [2, 0]],
    2: [[0, 3], [0, 2]],
    3: [[-3, 0], [-2, 0]]
  } : {
    0: [[0, -7], [0, -6], [0, -5], [0, -4], [0, -3], [0, -2], [0, -1]],
    1: [[7, 0], [6, 0], [5, 0], [4, 0], [3, 0], [2, 0], [1, 0]],
    2: [[0, 7], [0, 6], [0, 5], [0, 4], [0, 3], [0, 2], [0, 1]],
    3: [[-7, 0], [-6, 0], [-5, 0], [-4, 0], [-3, 0], [-2, 0], [-1, 0]]
  };

  PERIMETER = is2Pegs ? [
    [-1, -4], [0, -4], [1, -4], [1, -3], [1, -2], [1, -1], [2, -1], [3, -1],
    [4, -1], [4, 0], [4, 1], [3, 1], [2, 1], [1, 1], [1, 2], [1, 3],
    [1, 4], [0, 4], [-1, 4], [-1, 3], [-1, 2], [-1, 1], [-2, 1], [-3, 1],
    [-4, 1], [-4, 0], [-4, -1], [-3, -1], [-2, -1], [-1, -1], [-1, -2], [-1, -3]
  ] : [
    [-2, -8], [-1, -8], [0, -8], [1, -8], [2, -8],
    [2, -7], [2, -6], [2, -5], [2, -4], [2, -3], [2, -2],
    [3, -2], [4, -2], [5, -2], [6, -2], [7, -2], [8, -2],
    [8, -1], [8, 0], [8, 1], [8, 2],
    [7, 2], [6, 2], [5, 2], [4, 2], [3, 2], [2, 2],
    [2, 3], [2, 4], [2, 5], [2, 6], [2, 7], [2, 8],
    [1, 8], [0, 8], [-1, 8], [-2, 8],
    [-2, 7], [-2, 6], [-2, 5], [-2, 4], [-2, 3], [-2, 2],
    [-3, 2], [-4, 2], [-5, 2], [-6, 2], [-7, 2], [-8, 2],
    [-8, 1], [-8, 0], [-8, -1], [-8, -2],
    [-7, -2], [-6, -2], [-5, -2], [-4, -2], [-3, -2], [-2, -2],
    [-2, -3], [-2, -4], [-2, -5], [-2, -6], [-2, -7]
  ];

  START_SPACES = is2Pegs ? [2, 10, 18, 26] : [4, 20, 36, 52];
  SHORTCUT_SPACES = is2Pegs ? [5, 13, 21, 29] : [10, 26, 42, 58];
}

const PLAYERS = {
  0: { color: 'bg-[#f43f5e]', dotColor: '#f43f5e', glow: 'shadow-[0_0_15px_#f43f5e]', text: 'text-rose-500', name: 'Player 1' },
  1: { color: 'bg-[#3b82f6]', dotColor: '#3b82f6', glow: 'shadow-[0_0_15px_#3b82f6]', text: 'text-blue-500', name: 'Player 2' },
  2: { color: 'bg-[#eab308]', dotColor: '#eab308', glow: 'shadow-[0_0_15px_#eab308]', text: 'text-yellow-500', name: 'Player 3' },
  3: { color: 'bg-[#22c55e]', dotColor: '#22c55e', glow: 'shadow-[0_0_15px_#22c55e]', text: 'text-green-500', name: 'Player 4' }
};

const DICE_ROTATIONS = [
  'rotateX(0deg) rotateY(0deg)',      // 1
  'rotateX(0deg) rotateY(-90deg)',    // 2
  'rotateX(-90deg) rotateY(0deg)',    // 3
  'rotateX(90deg) rotateY(0deg)',     // 4
  'rotateX(0deg) rotateY(90deg)',     // 5
  'rotateX(0deg) rotateY(180deg)'     // 6
];

// =============== MULTIPLAYER STATE ===============
let mySlot = null;
let activeSlots = [];
let pegsCountGlobal = 4;
let isHost = false;
let latestSlots = [];
let latestPlayerNames = ['', '', '', ''];
let visualMap = {0: 0, 1: 1, 2: 2, 3: 3};

// =============== GAME STATE ===============
let pieces = [];
let currentPlayer = 0;
let diceValue = null;
let diceRolled = false;
let validMoves = [];
let isAnimating = false;
let finishedPlayers = []; // tracks finish order (slot indices)

// =============== NETWORK HANDLERS ===============
socket.on('connect', () => {
  const code = sessionStorage.getItem('dosaRoom');
  const slot = sessionStorage.getItem('dosaSlot');
  const gameHidden = document.getElementById('game-screen')?.classList.contains('hidden');
  
  if (code && !gameHidden) {
    socket.emit('join_room', code); 
    setTimeout(() => socket.emit('request_sync'), 500); 
  } else if (code && slot !== null) {
    const name = sessionStorage.getItem('dosaName') || `Player ${parseInt(slot) + 1}`;
    socket.emit('reclaim_slot', { roomId: code, slot: parseInt(slot), playerName: name });
    setTimeout(() => socket.emit('request_sync'), 500);
  }
});

socket.on('sync_requested', (requesterSocketId) => {
  if (pieces && pieces.length > 0) {
    socket.emit('send_sync', {
      targetSocket: requesterSocketId,
      state: { pieces, currentPlayer, activeSlots, pegsCountGlobal, visualMap, slots: latestSlots, playerNames: latestPlayerNames }
    });
  }
});

socket.on('sync_data', (state) => {
  if (state && state.pieces) {
    document.getElementById('home-screen').classList.add('hidden');
    document.getElementById('lobby-screen').classList.add('hidden');
    document.getElementById('game-screen').classList.remove('hidden');

    pieces = state.pieces;
    currentPlayer = state.currentPlayer;
    activeSlots = state.activeSlots;
    pegsCountGlobal = state.pegsCountGlobal;
    visualMap = state.visualMap;
    if (state.playerNames) {
      latestPlayerNames = state.playerNames;
    }
    if (state.slots) {
      latestSlots = state.slots;
      mySlot = null;
      for(let i=0; i<4; i++) {
        if (state.slots[i] === socket.id) {
          mySlot = i;
          break;
        }
      }
      isHost = (state.slots.find(s => s !== null && s !== 'bot') === socket.id);
    }

    diceRolled = false;
    isAnimating = false;
    validMoves = [];
    
    initBoard(true);
    updateUI();
    renderPieces();
  }
});

// Failsafe for mobile background throttling
setInterval(() => {
  if (isAnimating) {
    const cube = document.getElementById('dice-cube');
    cube.classList.remove('rolling');
    isAnimating = false;
    updateUI();
  }
}, 3000);

socket.on('lobby_state', (state) => {
  mySlot = null;
  for(let i=0; i<4; i++) {
    if (state.slots[i] === socket.id) {
      mySlot = i;
      break;
    }
  }
  isHost = (state.slots.find(s => s !== null && s !== 'bot') === socket.id);

  if (state.playerNames) {
    latestPlayerNames = state.playerNames;
  }

  if (state.gameState === 'playing') {
    document.getElementById('home-screen').classList.add('hidden');
    document.getElementById('lobby-screen').classList.add('hidden');
    document.getElementById('game-screen').classList.remove('hidden');
    socket.emit('request_sync');
    return;
  }

  document.getElementById('home-screen').classList.add('hidden');
  document.getElementById('lobby-screen').classList.remove('hidden');
  document.getElementById('game-screen').classList.add('hidden');
  document.getElementById('victory-screen').classList.add('hidden');
  document.getElementById('lobby-room-code').innerText = `Room: ${state.roomId}`;
  latestSlots = state.slots;
  mySlot = null;
  for(let i=0; i<4; i++) {
    const btn = document.getElementById(`slot-${i}`);
    if (state.slots[i]) {
       if (state.slots[i] === socket.id) {
         btn.innerHTML = `<button class="w-full h-full bg-slate-100 font-bold flex items-center justify-center gap-2 text-slate-800"><div class="w-4 h-4 rounded-full ${PLAYERS[i].color}"></div> ${state.playerNames[i]} (You)</button>`;
       } else if (state.slots[i] === 'bot') {
         btn.innerHTML = `
           <div class="flex-1 h-full bg-slate-50 font-bold flex items-center justify-center gap-2 text-slate-600"><div class="w-4 h-4 rounded-full ${PLAYERS[i].color}"></div> ${state.playerNames[i]}</div>
           ${isHost ? `<button onclick="removeBot(${i})" class="w-12 h-full bg-red-100 hover:bg-red-200 text-red-600 font-bold flex items-center justify-center transition-colors">X</button>` : ''}
         `;
       } else {
         btn.innerHTML = `<div class="w-full h-full bg-slate-50 font-bold flex items-center justify-center gap-2 text-slate-400 opacity-70 cursor-not-allowed">${state.playerNames[i]}</div>`;
       }
    } else {
       btn.innerHTML = `
         <button onclick="joinSlot(${i})" class="flex-1 h-full bg-white font-bold flex items-center justify-center gap-2 text-slate-500 hover:bg-slate-50 transition-colors"><div class="w-4 h-4 rounded-full ${PLAYERS[i].color}"></div> Join P${i+1}</button>
         ${isHost ? `<button onclick="addBot(${i})" class="w-12 h-full bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold flex items-center justify-center transition-colors text-lg" title="Add Bot">🤖</button>` : ''}
       `;
    }
  }
  
  const pegs = state.gameSettings.pegsPerPlayer;
  const btn2 = document.getElementById('btn-pegs-2');
  const btn4 = document.getElementById('btn-pegs-4');
  if (pegs === 2) {
    btn2.style.cssText = "background: linear-gradient(135deg,#6366f1,#8b5cf6); color: white; border: 1px solid transparent;";
    btn4.style.cssText = "background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); color: #94a3b8;";
  } else {
    btn2.style.cssText = "background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); color: #94a3b8;";
    btn4.style.cssText = "background: linear-gradient(135deg,#6366f1,#8b5cf6); color: white; border: 1px solid transparent;";
  }
  
  const startBtn = document.getElementById('start-btn');
  if (isHost && state.slots.filter(s => s !== null).length >= 2) {
    startBtn.disabled = false;
    startBtn.innerText = "Start Game";
  } else {
    startBtn.disabled = true;
    startBtn.innerText = "Waiting for players (min 2)...";
  }
});

function joinRoom() {
  const code = document.getElementById('room-code-input').value.toUpperCase().trim();
  if (code.length > 0) {
    sessionStorage.setItem('dosaRoom', code);
    socket.emit('join_room', code);
    document.getElementById('home-screen').classList.add('hidden');
  } else {
    alert("Please enter a room code!");
  }
}

function joinSlot(slotIndex) {
  if (mySlot !== null) return;
  const name = document.getElementById('nickname-input')?.value.trim() || `Player ${slotIndex + 1}`;
  sessionStorage.setItem('dosaSlot', slotIndex);
  sessionStorage.setItem('dosaName', name);
  socket.emit('join_slot', { slotIndex, playerName: name });
}

function addBot(slotIndex) {
  socket.emit('add_bot', slotIndex);
}

function removeBot(slotIndex) {
  socket.emit('remove_bot', slotIndex);
}

function setPegs(num) { socket.emit('update_settings', { pegsPerPlayer: num }); }
function startGame() { if(isHost) socket.emit('start_game'); }
function resetSession() { socket.emit('reset_session'); }
function returnToLobby() { socket.emit('return_to_lobby'); }

function leaveRoom() {
  socket.emit('leave_room');
  sessionStorage.removeItem('dosaRoom');
  sessionStorage.removeItem('dosaSlot');
  window.location.reload();
}

socket.on('game_started', (data) => {
  isAnimating = false;
  diceRolled = false;
  validMoves = [];
  finishedPlayers = [];
  document.getElementById('spectator-banner')?.remove();
  document.getElementById('lobby-screen').classList.add('hidden');
  document.getElementById('victory-screen').classList.add('hidden');
  document.getElementById('game-screen').classList.remove('hidden');
  document.getElementById('game-screen').classList.add('flex');
  pegsCountGlobal = data.gameSettings.pegsPerPlayer;
  latestSlots = data.slots;
  if (data.playerNames) {
    latestPlayerNames = data.playerNames;
  }
  activeSlots = data.slots.map((s, i) => s ? i : null).filter(i => i !== null);

  // Recalculate mySlot and isHost to prevent any desync at start
  mySlot = null;
  for(let i=0; i<4; i++) {
    if (data.slots[i] === socket.id) {
      mySlot = i;
      break;
    }
  }
  isHost = (data.slots.find(s => s !== null && s !== 'bot') === socket.id);
  
  visualMap = {0: 0, 1: 1, 2: 2, 3: 3};
  if (activeSlots.length === 2) {
    visualMap[activeSlots[0]] = activeSlots[0];
    visualMap[activeSlots[1]] = (activeSlots[0] + 2) % 4;
  }
  
  initBoard();
});

socket.on('dice_rolled', (data) => {
  isAnimating = true;
  const cube = document.getElementById('dice-cube');
  cube.classList.add('rolling');
  cube.style.transform = ''; 
  
  setTimeout(() => {
    cube.classList.remove('rolling');
    diceValue = data.value;
    cube.style.transform = DICE_ROTATIONS[diceValue - 1];
    
    diceRolled = true;
    isAnimating = false;

    // Bot emote on 6:
    if (isHost && latestSlots[currentPlayer] === 'bot' && diceValue === 6 && Math.random() < 0.4) {
      setTimeout(() => {
        const emotes6 = ['🎲', '😮', '🍀', '😎'];
        const randomEmote = emotes6[Math.floor(Math.random() * emotes6.length)];
        socket.emit('send_emote', { player: currentPlayer, emoji: randomEmote });
      }, 300);
    }

    if (currentPlayer === mySlot || (isHost && latestSlots[currentPlayer] === 'bot')) {
      calculateValidMoves();
      if (validMoves.length === 0) {
        if (diceValue === 6) {
          setTimeout(() => { diceRolled = false; validMoves = []; updateUI(); renderPieces(); }, 1000);
        } else {
          setTimeout(() => socket.emit('next_turn'), 1000);
        }
      } else {
        renderPieces();
        if (isHost && latestSlots[currentPlayer] === 'bot') {
          setTimeout(() => {
            // Weighted scoring bot: all factors considered simultaneously
            function scoreBotMove(m) {
              let score = 0;
              // Capture enemy: highest value but weighed against other factors
              if (m.action === 'move' || m.action === 'leave_jail') {
                const hasEnemy = pieces.some(p =>
                  p.player !== currentPlayer && p.state === 'perimeter' && p.pos === m.target
                );
                if (hasEnemy) score += 150;
              }
              // Advance toward home: reward distance traveled
              if (m.action === 'move') {
                const start = visualMap[currentPlayer] * (pegsCountGlobal === 2 ? 8 : 16) + (pegsCountGlobal === 2 ? 2 : 4);
                const totalLen = pegsCountGlobal === 2 ? 32 : 64;
                const dist = (m.piece.pos - start + totalLen) % totalLen;
                score += dist; // 0-62 or 0-30
                // Penalize moving piece that is very far back (prefer advancing front pieces)
                if (dist > (pegsCountGlobal === 2 ? 25 : 50)) score += 30;
              }
              // Entering home is very good
              if (m.action === 'home') score += 120 + (m.target * 10);
              // Getting out of jail is good but not at all costs
              if (m.action === 'leave_jail') score += 60;
              // Avoid dangerous squares (occupied by enemies that could capture us next turn)
              if (m.action === 'move') {
                const totalLen = pegsCountGlobal === 2 ? 32 : 64;
                const inDanger = pieces.some(p =>
                  p.player !== currentPlayer && p.state === 'perimeter' &&
                  (p.pos + 1) % totalLen === m.target
                );
                if (inDanger) score -= 30;
              }
              return score;
            }

            let bestMove = validMoves[0];
            let bestScore = -Infinity;
            for (let m of validMoves) {
              const s = scoreBotMove(m);
              if (s > bestScore) { bestScore = s; bestMove = m; }
            }
            selectMove(bestMove);
          }, 800);
        }
      }
    }
  }, 600);
});

socket.on('move_executed', (data) => {
  const piece = pieces.find(p => p.id === data.pieceId);
  const { action, target } = data;
  
  if (action === 'leave_jail' || action === 'shortcut' || action === 'move') {
    piece.state = 'perimeter'; piece.pos = target;
  } else if (action === 'home') {
    piece.state = 'home'; piece.pos = target;
  }
  
  // Combat Check
  let captured = false;
  if (piece.state === 'perimeter') {
    const enemies = pieces.filter(p => p.player !== currentPlayer && p.state === 'perimeter' && p.pos === piece.pos);
    enemies.forEach(e => {
      e.state = 'jail';
      captured = true;
      const taken = pieces.filter(p => p.player === e.player && p.state === 'jail').map(p => p.pos);
      for (let i = 0; i < pegsCountGlobal; i++) {
        if (!taken.includes(i)) { e.pos = i; break; }
      }
      // If the captured player is a bot, let them emote sad
      if (isHost && latestSlots[e.player] === 'bot' && Math.random() < 0.6) {
        setTimeout(() => {
          socket.emit('send_emote', { player: e.player, emoji: Math.random() < 0.5 ? '😢' : '💧' });
        }, 500);
      }
    });
  }
  
  // If current player is a bot, let them emote depending on their action!
  if (isHost && latestSlots[currentPlayer] === 'bot') {
    let emote = null;
    if (captured) {
      emote = Math.random() < 0.5 ? '😎' : '😂';
    } else if (action === 'home') {
      emote = Math.random() < 0.5 ? '🎉' : '🚀';
    } else if (action === 'shortcut') {
      emote = '🔥';
    }
    
    if (emote && Math.random() < 0.8) {
      setTimeout(() => {
        socket.emit('send_emote', { player: currentPlayer, emoji: emote });
      }, 400);
    }
  }

  validMoves = [];
  renderPieces();
  
  // Win Check — player finished all pegs in home
  const inHome = pieces.filter(p => p.player === currentPlayer && p.state === 'home');
  if (inHome.length === pegsCountGlobal && !finishedPlayers.includes(currentPlayer)) {
    finishedPlayers.push(currentPlayer);
    if (currentPlayer === mySlot || (isHost && latestSlots[currentPlayer] === 'bot')) {
      socket.emit('player_finished', currentPlayer);
    }
    return; // wait for server player_ranked response to continue
  }
  
  if (currentPlayer === mySlot || (isHost && latestSlots[currentPlayer] === 'bot')) {
    if (diceValue === 6 || action === 'shortcut') {
      diceRolled = false; updateUI();
    } else {
      setTimeout(() => socket.emit('next_turn'), 600);
    }
  }
});

socket.on('turn_passed', () => {
  do {
    currentPlayer = (currentPlayer + 1) % 4;
  } while ((!activeSlots.includes(currentPlayer) || finishedPlayers.includes(currentPlayer)) && activeSlots.length > 0);
  diceRolled = false;
  validMoves = [];
  diceValue = null;
  updateUI();
  renderPieces();
});

socket.on('player_ranked', (data) => {
  const { playerSlot, rank, finishOrder } = data;
  finishedPlayers = finishOrder;
  const rankEmoji = ['🥇','🥈','🥉','4️⃣'][rank - 1] || `#${rank}`;
  const name = latestPlayerNames[playerSlot] || (latestSlots[playerSlot] === 'bot' ? `Bot P${playerSlot+1}` : PLAYERS[playerSlot].name);
  
  // Show toast
  const toast = document.createElement('div');
  toast.style.cssText = `position:fixed; top:20px; left:50%; transform:translateX(-50%); z-index:200; padding:12px 24px; border-radius:999px; font-weight:900; font-size:14px; letter-spacing:0.1em; text-transform:uppercase; animation: floatUp 3s forwards; white-space:nowrap; background: linear-gradient(135deg,#1e1b4b,#312e81); border: 1px solid rgba(255,255,255,0.2); color: white; box-shadow: 0 8px 30px rgba(0,0,0,0.5);`;
  toast.innerText = `${rankEmoji} ${name} finished!`;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
  
  // If I finished, show spectator banner
  if (playerSlot === mySlot) {
    const banner = document.createElement('div');
    banner.id = 'spectator-banner';
    banner.style.cssText = `position:fixed; bottom:0; left:0; right:0; z-index:100; padding:14px; text-align:center; font-weight:900; font-size:13px; letter-spacing:0.15em; text-transform:uppercase; background: linear-gradient(135deg,rgba(99,102,241,0.9),rgba(139,92,246,0.9)); backdrop-filter:blur(10px); border-top: 1px solid rgba(255,255,255,0.2); color:white;`;
    banner.innerText = `${rankEmoji} You finished ${rank === 1 ? '1st' : rank === 2 ? '2nd' : rank === 3 ? '3rd' : rank+'th'}! Spectating...`;
    document.body.appendChild(banner);
  }
  
  // Continue the game — pass the turn
  if (currentPlayer === mySlot || (isHost && latestSlots[currentPlayer] === 'bot')) {
    setTimeout(() => socket.emit('next_turn'), 600);
  }
});

socket.on('game_over', (finishOrder) => {
  document.getElementById('spectator-banner')?.remove();
  const MEDALS = ['🥇','🥈','🥉','4️⃣'];
  let podium = '';
  if (Array.isArray(finishOrder) && finishOrder.length > 0) {
    finishOrder.forEach((slot, i) => {
      const name = latestPlayerNames[slot] || (latestSlots[slot] === 'bot' ? `Bot P${slot+1}` : PLAYERS[slot].name);
      podium += `<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.08);">
        <span style="font-size:1.4rem;">${MEDALS[i]||'·'}</span>
        <span style="font-weight:800;color:${PLAYERS[slot].dotColor};letter-spacing:0.05em;">${name}</span>
      </div>`;
    });
  }
  document.getElementById('winner-name').innerHTML = podium || 'Game Over';
  document.getElementById('victory-screen').classList.remove('hidden');
});

// =============== BOARD INITIALIZATION ===============

function initBoard(keepState = false) {
  updateBoardConstants();

  const holesEl = document.getElementById('holes');
  holesEl.innerHTML = ''; 
  
  if (!keepState) {
    pieces = [];
    currentPlayer = activeSlots.length > 0 ? activeSlots[0] : 0;
    diceRolled = false;
    diceValue = null;
  }
  
  function addHole(x, y, type) {
    const el = document.createElement('div');
    let bg;
    if (type === 'jail') bg = 'rgba(255,255,255,0.12)';
    else if (type === 'home') bg = 'rgba(255,255,255,0.18)';
    else bg = 'rgba(255,255,255,0.1)';
    el.className = `absolute rounded-full`;
    el.style.cssText = `left:${(x + OFFSET + 0.5) * (100 / GRID_SIZE)}%; top:${(y + OFFSET + 0.5) * (100 / GRID_SIZE)}%; width:4%; height:4%; transform:translate(-50%,-50%); background:${bg}; border: 1px solid rgba(255,255,255,0.25); box-shadow: inset 0 1px 3px rgba(0,0,0,0.4);`;
    holesEl.appendChild(el);
  }

  for (let p in JAILS) {
    JAILS[p].forEach((pos, i) => {
      addHole(pos[0], pos[1], 'jail');
    });
  }
  
  PERIMETER.forEach((pos) => addHole(pos[0], pos[1], 'perimeter'));
  
  for (let p in HOMES) {
    for (let i = 0; i < pegsCountGlobal; i++) {
      addHole(HOMES[p][i][0], HOMES[p][i][1], 'home');
    }
  }
  
  // Determine Board Rotation
  let boardRot = 0;
  if (mySlot !== null) {
    const myVPlayer = visualMap[mySlot];
    if (myVPlayer === 0) boardRot = 180;
    else if (myVPlayer === 1) boardRot = 90;
    else if (myVPlayer === 2) boardRot = 0;
    else if (myVPlayer === 3) boardRot = -90;
  }
  document.getElementById('board-container').style.transform = `rotate(${boardRot}deg)`;

  // Draw Player Labels
  const labelOffset = pegsCountGlobal === 2 ? 6.5 : 10.5;
  const LABEL_POS = { 0: [0, -labelOffset], 1: [labelOffset, 0], 2: [0, labelOffset], 3: [-labelOffset, 0] };
  for (let p of activeSlots) {
    const vPlayer = visualMap[p];
    const el = document.createElement('div');
    el.className = `absolute text-xs font-bold opacity-40 tracking-widest ${PLAYERS[p].text} pointer-events-none text-center whitespace-nowrap`;
    el.style.left = `${(LABEL_POS[vPlayer][0] + OFFSET + 0.5) * (100 / GRID_SIZE)}%`;
    el.style.top = `${(LABEL_POS[vPlayer][1] + OFFSET + 0.5) * (100 / GRID_SIZE)}%`;
    el.style.transform = `translate(-50%, -50%) rotate(${-boardRot}deg)`;
    el.innerText = latestPlayerNames[p] || `P${parseInt(p)+1}`;
    holesEl.appendChild(el);
  }

  const piecesContainer = document.getElementById('pieces');
  piecesContainer.innerHTML = '';
  for (let p = 0; p < 4; p++) {
    if (!activeSlots.includes(p)) continue;
    for (let i = 0; i < pegsCountGlobal; i++) {
      const id = `${p}-${i}`;
      
      if (!keepState) {
        pieces.push({ id, player: p, state: 'jail', pos: i });
      }
      
      const el = document.createElement('div');
      el.id = `piece-${id}`;
      el.className = `piece absolute rounded-full ${PLAYERS[p].glow} z-10`;
      el.style.cssText = `width:2.8%; height:2.8%; transform:translate(-50%,-50%); background:${PLAYERS[p].dotColor}; box-shadow: 0 0 8px ${PLAYERS[p].dotColor}, 0 0 16px ${PLAYERS[p].dotColor}55;`;
      piecesContainer.appendChild(el);
    }
  }

  updateUI();
  renderPieces();
}

function getPieceVisualPosition(piece) {
  let cx, cy;
  let vPlayer = visualMap[piece.player];
  if (piece.state === 'jail') [cx, cy] = JAILS[vPlayer][piece.pos];
  else if (piece.state === 'perimeter') [cx, cy] = PERIMETER[piece.pos];
  else if (piece.state === 'home') [cx, cy] = HOMES[vPlayer][piece.pos];
  else if (piece.state === 'goal') [cx, cy] = GOAL;
  
  let off = {x:0, y:0};
  if (piece.state === 'perimeter' || piece.state === 'home') {
    const sharing = pieces.filter(p => p.state === piece.state && p.pos === piece.pos);
    const index = sharing.indexOf(piece);
    const offsets = [{x:0,y:0}, {x:-4,y:-4}, {x:4,y:-4}, {x:-4,y:4}, {x:4,y:4}];
    off = offsets[index] || {x:0, y:0};
  }
  return { x: cx, y: cy, offsetX: off.x, offsetY: off.y };
}

function renderPieces() {
  pieces.forEach(piece => {
    const { x, y, offsetX, offsetY } = getPieceVisualPosition(piece);
    const el = document.getElementById(`piece-${piece.id}`);
    
    el.style.left = `calc(${(x + OFFSET + 0.5) * (100 / GRID_SIZE)}% + ${offsetX}px)`;
    el.style.top = `calc(${(y + OFFSET + 0.5) * (100 / GRID_SIZE)}% + ${offsetY}px)`;
    
    const isValid = currentPlayer === mySlot && validMoves.some(m => m.piece.id === piece.id);
    if (isValid) {
      el.classList.add('ring-4', 'ring-indigo-500/50', 'animate-pulse', 'cursor-pointer', 'scale-125', 'z-20');
      el.onclick = () => selectMove(validMoves.find(m => m.piece.id === piece.id));
    } else {
      el.classList.remove('ring-4', 'ring-indigo-500/50', 'animate-pulse', 'cursor-pointer', 'scale-125', 'z-20');
      el.onclick = null;
    }
  });
}

function updateUI() {
  const statusEl = document.getElementById('status-text');
  let nameStr = latestPlayerNames[currentPlayer] || `Player ${currentPlayer + 1}`;
  let prefix = currentPlayer === mySlot ? '👉 Your Turn' : `${nameStr}'s Turn`;
  statusEl.innerText = prefix;
  const col = PLAYERS[currentPlayer].dotColor;
  statusEl.style.cssText = `background: rgba(255,255,255,0.1); border: 1px solid ${col}66; color: ${col}; box-shadow: 0 0 12px ${col}44;`;
  statusEl.className = `text-xs font-bold mt-1 inline-block px-5 py-1.5 rounded-full tracking-widest uppercase transition-all duration-300`;

  const cube = document.getElementById('dice-cube');
  if (cube) {
    cube.style.setProperty('--player-color', PLAYERS[currentPlayer].dotColor);
    // Trigger bot roll
    if (isHost && latestSlots[currentPlayer] === 'bot' && !diceRolled && !isAnimating) {
      setTimeout(() => rollDice(true), 1000);
    }
    if (!diceRolled && !isAnimating) cube.style.transform = 'rotateX(-25deg) rotateY(45deg)';
  }

  if (isHost && pieces && pieces.length > 0) {
    socket.emit('update_board_state', { pieces, currentPlayer, activeSlots, pegsCountGlobal, visualMap, slots: latestSlots, playerNames: latestPlayerNames });
  }
}

// =============== INTERACTION LOGIC ===============
function sendEmote(emoji) {
  if (mySlot === null) return;
  socket.emit('send_emote', emoji);
  // Unfocus the button to close the menu
  document.activeElement.blur();
}

// Sound map for special emotes
const EMOTE_SOUNDS = {
  '🐦': new Audio('/bird sound.mp3'),
  '💧': new Audio('/waterdrop sound.mp3'),
};

socket.on('receive_emote', (data) => {
  const { player, emoji } = data;
  const vPlayer = visualMap[player];
  const holesEl = document.getElementById('holes');
  
  // Play sound if this emote has one
  if (EMOTE_SOUNDS[emoji]) {
    const snd = EMOTE_SOUNDS[emoji].cloneNode();
    snd.volume = 0.8;
    snd.play().catch(() => {}); // silently ignore autoplay block
  }
  
  const wrapper = document.createElement('div');
  wrapper.className = 'absolute z-[100] drop-shadow-xl pointer-events-none';
  
  const el = document.createElement('div');
  el.className = 'text-5xl emote-anim';
  el.innerText = emoji;
  
  const labelOffset = pegsCountGlobal === 2 ? 5 : 9;
  const LABEL_POS = { 0: [0, -labelOffset], 1: [labelOffset, 0], 2: [0, labelOffset], 3: [-labelOffset, 0] };
  wrapper.style.left = `${(LABEL_POS[vPlayer][0] + OFFSET + 0.5) * (100 / GRID_SIZE)}%`;
  wrapper.style.top = `${(LABEL_POS[vPlayer][1] + OFFSET + 0.5) * (100 / GRID_SIZE)}%`;
  
  // Counter-rotate the wrapper so it always faces upwards relative to the screen
  const container = document.getElementById('board-container');
  const rotMatch = container.style.transform.match(/rotate\(([-\d]+)deg\)/);
  const boardRot = rotMatch ? parseInt(rotMatch[1]) : 0;
  wrapper.style.transform = `translate(-50%, -50%) rotate(${-boardRot}deg)`;
  
  wrapper.appendChild(el);
  holesEl.appendChild(wrapper);
  setTimeout(() => wrapper.remove(), 2000);
});

function rollDice(isBotAuto = false) {
  if (isAnimating || diceRolled) return;
  if (currentPlayer !== mySlot) {
    if (!isHost || latestSlots[currentPlayer] !== 'bot' || !isBotAuto) return;
  }
  const val = Math.floor(Math.random() * 6) + 1;
  socket.emit('roll_dice', { player: currentPlayer, value: val });
}

function selectMove(moveObj) {
  socket.emit('execute_move', { pieceId: moveObj.piece.id, action: moveObj.action, target: moveObj.target });
}

function calculateValidMoves() {
  validMoves = [];
  
  // 1. Mandatory Shortcut Check
  let forcedShortcuts = [];
  for (let piece of pieces.filter(p => p.player === currentPlayer)) {
    if (piece.state === 'perimeter' && SHORTCUT_SPACES.includes(piece.pos) && diceValue === 1) {
      const step = pegsCountGlobal === 2 ? 8 : 16;
      const totalLen = pegsCountGlobal === 2 ? 32 : 64;
      const target = (piece.pos + step) % totalLen; // Jump to the NEXT inner corner
      let isBlocked = pieces.some(p => p.player === currentPlayer && p.state === 'perimeter' && p.pos === target);
      if (!isBlocked) {
        forcedShortcuts.push({ piece, action: 'shortcut', target });
      }
    }
  }

  // If there are forced shortcuts, those are the ONLY valid moves.
  if (forcedShortcuts.length > 0) {
    validMoves = forcedShortcuts;
    return;
  }

  // 2. Normal Moves
  let potentialMoves = [];
  pieces.filter(p => p.player === currentPlayer).forEach(piece => {
    if (piece.state === 'jail') {
      if (diceValue === 6) {
        const start = visualMap[currentPlayer] * (pegsCountGlobal === 2 ? 8 : 16) + (pegsCountGlobal === 2 ? 2 : 4);
        potentialMoves.push({ piece, action: 'leave_jail', target: start }); // Land on LEFT outer corner
      }
    } else if (piece.state === 'perimeter') {
      const start = visualMap[currentPlayer] * (pegsCountGlobal === 2 ? 8 : 16) + (pegsCountGlobal === 2 ? 2 : 4);
      const totalLen = pegsCountGlobal === 2 ? 32 : 64;
      const currentDist = (piece.pos - start + totalLen) % totalLen;
      const targetDist = currentDist + diceValue;
      const maxPerDist = pegsCountGlobal === 2 ? 30 : 62;
      if (targetDist <= maxPerDist) {
        potentialMoves.push({ piece, action: 'move', target: (piece.pos + diceValue) % totalLen });
      } else {
        const homePos = targetDist - (pegsCountGlobal === 2 ? 31 : 63);
        if (homePos < pegsCountGlobal) potentialMoves.push({ piece, action: 'home', target: homePos });
      }
    } else if (piece.state === 'home') {
      const targetPos = piece.pos + diceValue;
      if (targetPos < pegsCountGlobal) potentialMoves.push({ piece, action: 'home', target: targetPos });
    }
  });

  validMoves = potentialMoves.filter(move => {
    const targetState = (move.action === 'home') ? 'home' : 'perimeter';
    return !pieces.some(p => p.player === currentPlayer && p.state === targetState && p.pos === move.target);
  });
}

// Randomly spam bird and waterdrop emotes for bots as a joke
setInterval(() => {
  if (isHost && document.getElementById('home-screen').classList.contains('hidden') && document.getElementById('lobby-screen').classList.contains('hidden')) {
    const botSlots = [];
    for (let i = 0; i < 4; i++) {
      if (latestSlots[i] === 'bot') botSlots.push(i);
    }
    if (botSlots.length > 0 && Math.random() < 0.15) { // 15% chance every 8 seconds
      const randomBot = botSlots[Math.floor(Math.random() * botSlots.length)];
      const jokeEmotes = ['🐦', '💧'];
      const emoji = jokeEmotes[Math.floor(Math.random() * jokeEmotes.length)];
      socket.emit('send_emote', { player: randomBot, emoji });
    }
  }
}, 8000);

socket.on('open_rooms', (roomsList) => {
  const container = document.getElementById('open-rooms-container');
  const listEl = document.getElementById('open-rooms-list');
  if (!container || !listEl) return;
  
  listEl.innerHTML = '';
  const activeRooms = roomsList.filter(r => r.totalCount > 0);
  
  if (activeRooms.length === 0) {
    container.classList.add('hidden');
    return;
  }
  
  container.classList.remove('hidden');
  activeRooms.forEach(room => {
    const el = document.createElement('div');
    el.className = 'flex flex-col gap-1 p-3 rounded-xl text-left transition-all hover:bg-white/10 border border-white/5 cursor-pointer';
    el.style.background = 'rgba(255, 255, 255, 0.04)';
    el.onclick = () => {
      document.getElementById('room-code-input').value = room.roomId;
      joinRoom();
    };
    
    const statusText = room.gameState === 'lobby' ? 'In Lobby ⏳' : 'Playing 🎮';
    const statusColor = room.gameState === 'lobby' ? 'text-green-400' : 'text-indigo-400';
    
    el.innerHTML = `
      <div class="flex justify-between items-center">
        <span class="font-bold text-white tracking-wider uppercase text-sm">Room: ${room.roomId}</span>
        <span class="text-xs font-semibold ${statusColor}">${statusText}</span>
      </div>
      <div class="flex justify-between items-center text-xs text-indigo-200/60">
        <span>Players: ${room.totalCount}/4 (${room.humanCount} human)</span>
      </div>
      <div class="text-[10px] text-indigo-300/40 truncate">
        ${room.playerNames.join(', ')}
      </div>
    `;
    listEl.appendChild(el);
  });
});

document.addEventListener("DOMContentLoaded", () => {
  const savedName = sessionStorage.getItem('dosaName');
  if (savedName) {
    const input = document.getElementById('nickname-input');
    if (input) input.value = savedName;
  }
});
</script>
